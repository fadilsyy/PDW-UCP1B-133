<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Anggota — Tech Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./okhema-base.css">
    <link rel="stylesheet" href="./form.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar-okhema">
        <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
            <span class="navbar-brand-text">⚜ Tech Community</span>
            <div class="d-flex gap-1">
                <a href="./index.html"   class="nav-link-okhema">Beranda</a>
                <a href="./form.html"    class="nav-link-okhema active">Daftar</a>
                <a href="./gallery.html" class="nav-link-okhema">Galeri</a>
            </div>
        </div>
    </nav>

    <!-- PAGE HEADER -->
    <div class="page-header">
        <p class="page-label fade-up">✦ Pendaftaran Anggota</p>
        <h1 class="page-title fade-up-d1">Bergabunglah</h1>
        <div class="divider-ornate fade-up-d2">
            <div class="line"></div>
            <span class="gem">◆ ◇ ◆</span>
            <div class="line"></div>
        </div>
    </div>

    <!-- FORM CARD -->
    <div class="container px-3">
        <div class="form-card">
            <div class="corner-br"></div>

            <form id="memberForm" novalidate>
                <fieldset>
                    <legend>✦ Form Anggota Baru</legend>

                    <div class="field-group">
                        <label class="field-label" for="nama">Nama Lengkap</label>
                        <input type="text" id="nama" name="nama" class="field-input"
                               placeholder="Masukkan nama Anda" required>
                    </div>

                    <div class="field-group">
                        <label class="field-label" for="email">Alamat Email</label>
                        <input type="email" id="email" name="email" class="field-input"
                               placeholder="nama@email.com" required>
                    </div>

                    <div class="field-group">
                        <label class="field-label" for="minat">Bidang Minat</label>
                        <select id="minat" name="minat" class="field-input" required>
                            <option value="" disabled selected>— Pilih bidang minat —</option>
                            <option value="web">Web Development</option>
                            <option value="mobile">Mobile Development</option>
                            <option value="data">Data Science</option>
                            <option value="ai">Artificial Intelligence</option>
                        </select>
                    </div>

                    <div class="btn-row">
                        <button type="submit" class="btn-okhema">⚜ Submit</button>
                        <a href="./index.html" class="btn-ghost">← Kembali</a>
                    </div>
                </fieldset>
            </form>

            <!-- RESULT BOX -->
            <div class="result-box" id="result-box">
                <p class="result-label">✦ Data Tersimpan</p>
                <p class="result-item">Nama &nbsp; : <span id="r-nama"></span></p>
                <p class="result-item">Email &nbsp; : <span id="r-email"></span></p>
                <p class="result-item">Minat &nbsp; : <span id="r-minat"></span></p>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        ✦ &nbsp; Tech Community — Okhema Chapter &nbsp; ✦
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./form.js"></script>
</body>
</html>
